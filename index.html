<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Antara ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loginPage">
<div class="glass-card">
<h1>❤️ Birthday Surprise ❤️</h1>
<input id="username" type="text" placeholder="Enter Username">
<button onclick="login()">Let's Celebrate</button>
<p id="error"></p>
</div>
</div>

<div id="birthdayPage">
<h1 class="title">🎉 Happy Birthday Antara 🎉</h1>
<p id="typewriter"></p>

<div class="cake">
<div class="candles"></div>
<div class="tier top"></div>
<div class="tier middle"></div>
<div class="tier bottom"><span>ANTARA</span></div>
</div>

<div class="gallery">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
</div>

<button id="musicBtn">🎵 Play Music</button>
<audio id="music" loop>
<source src="birthday.mp3" type="audio/mpeg">
</audio>

<h2>❤️ Forever Yours, Amartya ❤️</h2>
</div>
<script src="script.js"></script>
</body>
</html>
